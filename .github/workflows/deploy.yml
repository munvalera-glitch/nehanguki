name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and deploy to server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Build check
        run: |
          npm ci
          npm run build

      - name: Deploy over SSH
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_BRANCH: main
          DEPLOY_RESTART_COMMAND: ${{ secrets.DEPLOY_RESTART_COMMAND }}
        run: |
          set -euo pipefail

          : "${DEPLOY_HOST:?Missing DEPLOY_HOST secret}"
          : "${DEPLOY_USER:?Missing DEPLOY_USER secret}"
          : "${DEPLOY_KEY:?Missing DEPLOY_KEY secret}"
          : "${DEPLOY_PATH:?Missing DEPLOY_PATH secret}"

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$DEPLOY_PORT" -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

          tar \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.env' \
            --exclude='data' \
            --exclude='outputs' \
            --exclude='temp' \
            --exclude='server.log' \
            --exclude='vite_output.log' \
            -czf /tmp/hikoreaforms-release.tgz .

          scp -i ~/.ssh/deploy_key -P "$DEPLOY_PORT" /tmp/hikoreaforms-release.tgz "$DEPLOY_USER@$DEPLOY_HOST:/tmp/hikoreaforms-release.tgz"

          ssh -i ~/.ssh/deploy_key -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
            "DEPLOY_PATH='$DEPLOY_PATH' DEPLOY_BRANCH='$DEPLOY_BRANCH' DEPLOY_RESTART_COMMAND='$DEPLOY_RESTART_COMMAND' bash -s" <<'REMOTE'
          set -euo pipefail

          mkdir -p "$DEPLOY_PATH"
          cd "$DEPLOY_PATH"
          tar -xzf /tmp/hikoreaforms-release.tgz -C "$DEPLOY_PATH"
          rm -f /tmp/hikoreaforms-release.tgz

          npm ci
          npm run build

          if [ -n "${DEPLOY_RESTART_COMMAND:-}" ]; then
            bash -lc "$DEPLOY_RESTART_COMMAND"
          elif command -v pm2 >/dev/null 2>&1; then
            pm2 restart hikoreaforms-api --update-env || pm2 start server.js --name hikoreaforms-api --update-env
            pm2 save || true
          else
            echo "No DEPLOY_RESTART_COMMAND configured and pm2 is not installed." >&2
            exit 1
          fi
          REMOTE
